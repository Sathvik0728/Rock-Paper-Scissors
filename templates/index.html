<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Rock Paper Scissors</title>

    <!-- CSS -->

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/style.css') }}">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap"
    rel="stylesheet">

</head>

<body>

<!-- Animated Background -->

<div class="background"></div>

<!-- Main Container -->

<div class="container">

    <!-- Title -->

    <h1>ROCK PAPER SCISSORS</h1>

    <p class="subtitle">
        Ultimate AI Battle Arena
    </p>

    <!-- Game Mode Buttons -->

    <div class="mode-buttons">

        <button onclick="setMode('3')">
            🔥 Best Of 3
        </button>

        <button onclick="setMode('5')">
            ⚡ Best Of 5
        </button>

        <button onclick="setMode('infinite')">
            ♾️ Infinite Mode
        </button>

    </div>

    <!-- Mode Status -->

    <div class="game-status">

        <h2 id="modeText">
            Select Game Mode
        </h2>

    </div>

    <!-- Scoreboard -->

    <div class="scoreboard">

        <div class="score-card">

            <h3>YOU</h3>

            <span id="userScore">0</span>

        </div>

        <div class="score-card">

            <h3>AI</h3>

            <span id="computerScore">0</span>

        </div>

    </div>

    <!-- Battle Zone -->

    <div class="battle-zone">

        <!-- User -->

        <div class="player-card">

            <h2>You</h2>

            <div id="userChoice"
            class="symbol">

                ⚡

            </div>

        </div>

        <!-- VS -->

        <div class="vs">

            VS

        </div>

        <!-- AI -->

        <div class="player-card">

            <h2>AI</h2>

            <div id="computerChoice"
            class="symbol">

                🤖

            </div>

        </div>

    </div>

    <!-- Choice Buttons -->

    <div class="choices">

        <button onclick="play('rock')">

            🪨

            <span>Rock</span>

        </button>

        <button onclick="play('paper')">

            📄

            <span>Paper</span>

        </button>

        <button onclick="play('scissors')">

            ✂️

            <span>Scissors</span>

        </button>

    </div>

    <!-- Result -->

    <div class="result-area">

        <h2 id="resultText">

            Choose Your Move

        </h2>

    </div>

</div>

<!-- Winner Popup -->

<div id="winnerPopup"
class="winner-popup hidden">

    <h1 id="winnerMessage">

    </h1>

    <button onclick="closePopup()">

        Play Again

    </button>

</div>

<!-- Mode Selection Popup -->

<div id="modePopup"
class="mode-popup hidden">

    <div class="mode-popup-box">

        <h2>
            ⚠ SELECT GAME MODE
        </h2>

        <p>

            Please choose:

            <br><br>

            🔥 Best Of 3

            <br>

            ⚡ Best Of 5

            <br>

            ♾️ Infinite Mode

        </p>

        <button onclick="closeModePopup()">

            OK

        </button>

    </div>

</div>

<!-- JavaScript -->

<script src="{{ url_for('static',
filename='js/script.js') }}"></script>

</body>
</html>
